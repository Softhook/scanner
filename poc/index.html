<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye of the Phantom — Flipper Zero PoC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080810;
    color: #9bbc0f;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  h1 {
    font-size: 1.4rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 18px;
    text-shadow: 0 0 12px #9bbc0f88;
    color: #9bbc0f;
  }

  #device {
    background: linear-gradient(145deg, #1a1a2e, #16162a);
    border: 3px solid #f97316;
    border-radius: 18px;
    padding: 20px 24px;
    box-shadow:
      0 0 30px #f9731622,
      inset 0 0 40px #00000080,
      0 8px 32px #00000060;
    position: relative;
  }

  #device::before {
    content: '';
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 3px;
    background: #f97316;
    border-radius: 2px;
    opacity: 0.5;
  }

  #screen-frame {
    background: #0f2a0f;
    border: 2px solid #1a3a1a;
    border-radius: 6px;
    padding: 6px;
    box-shadow: inset 0 0 20px #00000080;
  }

  canvas {
    display: block;
    width: 640px;
    height: 320px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 2px;
  }

  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin-top: 24px;
  }

  .dpad {
    display: grid;
    grid-template-columns: 40px 40px 40px;
    grid-template-rows: 40px 40px 40px;
    gap: 2px;
  }

  .dpad-btn {
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  .dpad-btn:hover { background: #333; color: #bbb; }
  .dpad-btn:active, .dpad-btn.pressed {
    background: #f97316;
    color: #fff;
    border-color: #fb923c;
    box-shadow: 0 0 10px #f9731644;
  }
  .dpad-empty { background: transparent; border: none; }

  .action-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .action-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid #444;
    background: #222;
    color: #888;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  .action-btn:hover { background: #333; color: #bbb; }
  .action-btn.ok:active, .action-btn.ok.pressed {
    background: #22c55e;
    color: #fff;
    border-color: #4ade80;
    box-shadow: 0 0 12px #22c55e44;
  }
  .action-btn.back:active, .action-btn.back.pressed {
    background: #ef4444;
    color: #fff;
    border-color: #f87171;
    box-shadow: 0 0 12px #ef444444;
  }

  #legend {
    margin-top: 20px;
    font-size: 0.7rem;
    color: #555;
    text-align: center;
    letter-spacing: 1px;
  }

  #legend span { color: #777; }
</style>
</head>
<body>

<h1>👁 Eye of the Phantom</h1>

<div id="device">

    <canvas id="screen" width="128" height="64"></canvas>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SCREEN_W = 128;
const SCREEN_H = 64;
const BG_COLOR = '#0f380f';
const FG_COLOR = '#9bbc0f';
const FG_DIM   = '#306230';

const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');

// ============================================================
// BITMAP FONT (4px wide × 5px tall)
// Each char: array of 5 rows, each row is 4 bits (MSB=left)
// ============================================================
const FONT = {
  'A':[0x6,0x9,0x9,0xF,0x9],'B':[0xE,0x9,0xE,0x9,0xE],'C':[0x7,0x8,0x8,0x8,0x7],
  'D':[0xE,0x9,0x9,0x9,0xE],'E':[0xF,0x8,0xE,0x8,0xF],'F':[0xF,0x8,0xE,0x8,0x8],
  'G':[0x7,0x8,0xB,0x9,0x7],'H':[0x9,0x9,0xF,0x9,0x9],'I':[0xE,0x4,0x4,0x4,0xE],
  'J':[0x7,0x1,0x1,0x9,0x6],'K':[0x9,0xA,0xC,0xA,0x9],'L':[0x8,0x8,0x8,0x8,0xF],
  'M':[0x9,0xF,0xF,0x9,0x9],'N':[0x9,0xD,0xB,0x9,0x9],'O':[0x6,0x9,0x9,0x9,0x6],
  'P':[0xE,0x9,0xE,0x8,0x8],'Q':[0x6,0x9,0x9,0xA,0x5],'R':[0xE,0x9,0xE,0xA,0x9],
  'S':[0x7,0x8,0x6,0x1,0xE],'T':[0xF,0x4,0x4,0x4,0x4],'U':[0x9,0x9,0x9,0x9,0x6],
  'V':[0x9,0x9,0x9,0x6,0x6],'W':[0x9,0x9,0xF,0xF,0x9],'X':[0x9,0x9,0x6,0x9,0x9],
  'Y':[0x9,0x9,0x6,0x4,0x4],'Z':[0xF,0x1,0x6,0x8,0xF],
  '0':[0x6,0x9,0x9,0x9,0x6],'1':[0x4,0xC,0x4,0x4,0xE],'2':[0x6,0x9,0x2,0x4,0xF],
  '3':[0xE,0x1,0x6,0x1,0xE],'4':[0x9,0x9,0xF,0x1,0x1],'5':[0xF,0x8,0xE,0x1,0xE],
  '6':[0x7,0x8,0xF,0x9,0x6],'7':[0xF,0x1,0x2,0x4,0x4],'8':[0x6,0x9,0x6,0x9,0x6],
  '9':[0x6,0x9,0x7,0x1,0x6],
  ' ':[0,0,0,0,0],'!':[0x4,0x4,0x4,0x0,0x4],'?':[0x6,0x9,0x2,0x0,0x2],
  ':':[0x0,0x4,0x0,0x4,0x0],'.':[0,0,0,0,0x4],'-':[0,0,0xF,0,0],
  '+':[0x0,0x4,0xE,0x4,0x0],'/':[0x1,0x2,0x4,0x8,0x0],'%':[0x9,0x1,0x6,0x8,0x9],
  '#':[0xA,0xF,0xA,0xF,0xA],'>':[0x8,0x4,0x2,0x4,0x8],'<':[0x2,0x4,0x8,0x4,0x2],
  '*':[0xA,0x4,0xE,0x4,0xA],'=':[0x0,0xF,0x0,0xF,0x0],'_':[0,0,0,0,0xF],
  '(':[0x2,0x4,0x4,0x4,0x2],')':[0x4,0x2,0x2,0x2,0x4],',':[0,0,0,0x2,0x4],
  '\'':[0x4,0x4,0,0,0], '"':[0xA,0xA,0,0,0], '~':[0,0x5,0xA,0,0],
  'x':[0,0x9,0x6,0x6,0x9],
};
const FONT_W = 4;
const FONT_H = 5;
const CHAR_W = FONT_W + 1;
const CHAR_H = FONT_H + 1;

// ============================================================
// SPRITE PARTS (16x16 modular creature sprites)
// Each part is an array of rows; each row is a string of 16 chars (. = off, # = on)
// Head: rows 0-5, Body: rows 4-10, Feet: rows 9-15
// Parts are OR-composited to create the full 16x16 sprite
// ============================================================

const HEADS = [
  // 0: Skull (round dome with eye sockets)
  [
    '................',
    '....########....',
    '...#........#...',
    '..#..##..##..#..',
    '..#..##..##..#..',
    '...#...##...#...',
  ],
  // 1: Cyclops Eye (single large eye)
  [
    '................',
    '.....######.....',
    '...##......##...',
    '..#...####...#..',
    '..#..######..#..',
    '...##..##..##...',
  ],
  // 2: Static/Glitch (noisy rectangle)
  [
    '................',
    '..############..',
    '..#.#.##.#.#.#..',
    '..##.#..#.##.#..',
    '..#.##.##.#..#..',
    '..############..',
  ],
  // 3: Horned Crown (spiky top)
  [
    '.#...######...#.',
    '.##.#......#.##.',
    '..###......###..',
    '...#..#..#..#...',
    '...#..####..#...',
    '...##########...',
  ],
];

const BODIES = [
  // 0: Slime (rounded amorphous blob)
  [
    '................',
    '....########....',
    '...##########...',
    '..############..',
    '...##########...',
    '....########....',
    '...##......##...',
  ],
  // 1: Mech (boxy mechanical)
  [
    '................',
    '...##########...',
    '...#..####..#...',
    '...#.#....#.#...',
    '...#..####..#...',
    '...##########...',
    '....#......#....',
  ],
  // 2: Beast (broad organic torso)
  [
    '................',
    '..#..######..#..',
    '..##.######.##..',
    '...##########...',
    '...##########...',
    '....########....',
    '....#......#....',
  ],
  // 3: Crystal (geometric diamond)
  [
    '................',
    '......####......',
    '.....##..##.....',
    '....##....##....',
    '.....##..##.....',
    '......####......',
    '.....#....#.....',
  ],
];

const FEET = [
  // 0: Claws (sharp pointed)
  [
    '................',
    '....#......#....',
    '...##......##...',
    '..###......###..',
    '.##.#......#.##.',
    '#...#......#...#',
    '................',
  ],
  // 1: Hover (floating with energy below)
  [
    '................',
    '....########....',
    '................',
    '..#..#..#..#.#..',
    '................',
    '.#.#.#..#.#.#...',
    '................',
  ],
  // 2: Tentacles (wavy tendrils)
  [
    '................',
    '...#..#..#..#...',
    '..#..#..#..#....',
    '...#..#..#..#...',
    '..#..#..#..#....',
    '.#..#..#..#.....',
    '................',
  ],
  // 3: Legs (simple bipedal)
  [
    '................',
    '....##....##....',
    '....##....##....',
    '....##....##....',
    '...##.....###...',
    '...###....###...',
    '................',
  ],
];

// ============================================================
// CLASS DEFINITIONS
// ============================================================
const CLASSES = ['BRAWLER','DEFENDER','GLITCH'];
const CLASS_COLORS = { BRAWLER: 1, DEFENDER: 1, GLITCH: 1 };
const CLASS_STAT_BIAS = {
  BRAWLER:    { hp: 1.2, atk: 1.5, def: 0.8, spd: 0.7 },
  DEFENDER:   { hp: 1.4, atk: 0.7, def: 1.5, spd: 0.8 },
  GLITCH:     { hp: 0.7, atk: 1.1, def: 0.6, spd: 1.6 },
};
const PROTOCOLS_IR = ['NEC','SONY','SAMSUNG','RC5'];
const PROTOCOLS_RF = ['FIXED','ROLLING','SENSOR','RAW'];
// Combined for enemy generation
const PROTOCOLS = PROTOCOLS_IR.concat(PROTOCOLS_RF);
// 433MHz protocol → class mapping (different flavors)
const RF_CLASS_MAP = { FIXED: 'BRAWLER', ROLLING: 'GLITCH', SENSOR: 'DEFENDER', RAW: 'GLITCH' };

// Name syllables for procedural naming
const SYL1 = ['ZAR','NEX','VOL','KRI','PHA','DRE','MOX','SYN','VEX','LUR','GHO','TYR','BYT','NIX','ORC','HEX'];
const SYL2 = ['TON','REX','IUS','ARA','BIT','ION','OID','ULK','ASH','IRE','ALT','ORB','INK','OSS','EEL','AMP'];

// ============================================================
// AUDIO ENGINE (Web Audio bleeps)
// ============================================================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, dur, vol = 0.08, type = 'square') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxNavigate() { beep(800, 0.05); }
function sfxSelect()   { beep(1200, 0.08); beep(1600, 0.08); }
function sfxBack()     { beep(400, 0.08); }
function sfxHit()      { beep(200, 0.1, 0.12); }
function sfxCrit()     { beep(300, 0.06, 0.15); setTimeout(() => beep(600, 0.1, 0.15), 60); }
function sfxHeal()     { beep(600, 0.1); setTimeout(() => beep(900, 0.15), 100); }
function sfxScan()     { for(let i=0;i<5;i++) setTimeout(()=>beep(400+i*200,0.06,0.04),i*80); }
function sfxScanRF()   { for(let i=0;i<8;i++) setTimeout(()=>beep(200+i*80,0.04,0.03,'triangle'),i*50); }
function sfxVictory()  { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.15,0.1),i*120)); }
function sfxDefeat()   { [400,300,200,100].forEach((f,i)=>setTimeout(()=>beep(f,0.2,0.1),i*150)); }

// ============================================================
// RENDERER
// ============================================================
const pixelBuffer = new Uint8Array(SCREEN_W * SCREEN_H);
let screenShake = 0;
let screenFlash = 0;

function clearBuffer() { pixelBuffer.fill(0); }

function setPixel(x, y, on = true) {
  x = Math.floor(x); y = Math.floor(y);
  if (x >= 0 && x < SCREEN_W && y >= 0 && y < SCREEN_H)
    pixelBuffer[y * SCREEN_W + x] = on ? 1 : 0;
}

function getPixel(x, y) {
  x = Math.floor(x); y = Math.floor(y);
  if (x >= 0 && x < SCREEN_W && y >= 0 && y < SCREEN_H)
    return pixelBuffer[y * SCREEN_W + x];
  return 0;
}

function drawRect(x, y, w, h, fill = false) {
  x=Math.floor(x); y=Math.floor(y); w=Math.floor(w); h=Math.floor(h);
  if (fill) {
    for (let py = y; py < y + h; py++)
      for (let px = x; px < x + w; px++)
        setPixel(px, py);
  } else {
    for (let px = x; px < x + w; px++) { setPixel(px, y); setPixel(px, y + h - 1); }
    for (let py = y; py < y + h; py++) { setPixel(x, py); setPixel(x + w - 1, py); }
  }
}

function drawLine(x0, y0, x1, y1) {
  const dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    setPixel(x0, y0);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx)  { err += dx; y0 += sy; }
  }
}

function drawCircle(cx, cy, r, fill = false) {
  cx=Math.floor(cx); cy=Math.floor(cy); r=Math.floor(r);
  if (fill) {
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++)
        if (dx*dx + dy*dy <= r*r) setPixel(cx+dx, cy+dy);
  } else {
    let x = r, y = 0, err = 1 - r;
    while (x >= y) {
      setPixel(cx+x,cy+y); setPixel(cx-x,cy+y);
      setPixel(cx+x,cy-y); setPixel(cx-x,cy-y);
      setPixel(cx+y,cy+x); setPixel(cx-y,cy+x);
      setPixel(cx+y,cy-x); setPixel(cx-y,cy-x);
      y++;
      if (err < 0) err += 2*y+1;
      else { x--; err += 2*(y-x)+1; }
    }
  }
}

function drawText(text, x, y, invert = false) {
  const str = String(text).toUpperCase();
  for (let i = 0; i < str.length; i++) {
    const ch = FONT[str[i]];
    if (!ch) { continue; }
    const cx = x + i * CHAR_W;
    for (let row = 0; row < FONT_H; row++) {
      for (let col = 0; col < FONT_W; col++) {
        const bit = (ch[row] >> (FONT_W - 1 - col)) & 1;
        if (invert) {
          setPixel(cx + col, y + row, !bit);
        } else if (bit) {
          setPixel(cx + col, y + row);
        }
      }
    }
    // Invert background
    if (invert) {
      for (let row = -1; row <= FONT_H; row++)
        for (let col = -1; col < FONT_W + 1; col++) {
          const px = cx+col, py = y+row;
          if(col<0||col>=FONT_W||row<0||row>=FONT_H) setPixel(px,py,true);
        }
    }
  }
}

function drawTextCentered(text, y, invert = false) {
  const w = String(text).length * CHAR_W;
  drawText(text, Math.floor((SCREEN_W - w) / 2), y, invert);
}

function drawHBar(x, y, w, h, ratio) {
  ratio = Math.max(0, Math.min(1, ratio));
  drawRect(x, y, w, h);
  const fillW = Math.floor((w - 2) * ratio);
  if (fillW > 0) drawRect(x + 1, y + 1, fillW, h - 2, true);
}

// Sprite compositor: combines head + body + feet into a 16x16 grid
function compositeSprite(headIdx, bodyIdx, feetIdx) {
  const grid = Array.from({length: 16}, () => Array(16).fill(0));
  const parts = [
    { data: HEADS[headIdx % HEADS.length], startRow: 0 },
    { data: BODIES[bodyIdx % BODIES.length], startRow: 4 },
    { data: FEET[feetIdx % FEET.length], startRow: 9 },
  ];
  for (const part of parts) {
    for (let r = 0; r < part.data.length; r++) {
      const row = part.startRow + r;
      if (row >= 16) break;
      const line = part.data[r];
      for (let c = 0; c < 16 && c < line.length; c++) {
        if (line[c] === '#') grid[row][c] = 1;
      }
    }
  }
  return grid;
}

function drawSprite(grid, x, y, invert = false) {
  for (let r = 0; r < 16; r++)
    for (let c = 0; c < 16; c++)
      if (grid[r][c]) setPixel(x + c, y + r, !invert);
      else if (invert) setPixel(x + c, y + r, true);
}

function flushBuffer() {
  const imgData = ctx.createImageData(SCREEN_W, SCREEN_H);
  const bgR = 15, bgG = 56, bgB = 15;
  const fgR = 155, fgG = 188, fgB = 15;

  if (screenFlash > 0) {
    for (let i = 0; i < imgData.data.length; i += 4) {
      imgData.data[i] = 255; imgData.data[i+1] = 255;
      imgData.data[i+2] = 255; imgData.data[i+3] = 255;
    }
    screenFlash--;
  } else {
    for (let i = 0; i < pixelBuffer.length; i++) {
      const idx = i * 4;
      if (pixelBuffer[i]) {
        imgData.data[idx] = fgR; imgData.data[idx+1] = fgG;
        imgData.data[idx+2] = fgB; imgData.data[idx+3] = 255;
      } else {
        imgData.data[idx] = bgR; imgData.data[idx+1] = bgG;
        imgData.data[idx+2] = bgB; imgData.data[idx+3] = 255;
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * 4;
    const shakeY = (Math.random() - 0.5) * 4;
    canvas.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
    screenShake--;
    if (screenShake === 0) canvas.style.transform = '';
  }
}

// ============================================================
// PHANTOM GENERATION
// ============================================================
function generatePhantom(protocol, address, command, isRF = false) {
  let cls;
  if (isRF) {
    if (protocol === 'FIXED') cls = 'BRAWLER';
    else if (protocol === 'SENSOR') cls = 'DEFENDER';
    else if (protocol === 'RAW') cls = 'GLITCH';
    else cls = CLASSES[(address + command) % 3];
  } else {
    if (protocol === 'NEC') cls = 'BRAWLER';
    else if (protocol === 'SONY') cls = 'DEFENDER';
    else if (protocol === 'SAMSUNG') cls = 'GLITCH';
    else cls = CLASSES[(address + command) % 3];
  }
  const bias = CLASS_STAT_BIAS[cls];

  // Stat generation from command byte (0-255)
  const seed = command & 0xFF;
  const baseHP  = 30 + (seed % 20);
  const baseATK = 8 + ((seed * 3 + 7) % 12);
  const baseDEF = 6 + ((seed * 5 + 13) % 12);
  const baseSPD = 5 + ((seed * 7 + 3) % 10);

  const stats = {
    hp:  Math.floor(baseHP * bias.hp),
    atk: Math.floor(baseATK * bias.atk),
    def: Math.floor(baseDEF * bias.def),
    spd: Math.floor(baseSPD * bias.spd),
  };

  // Sprite from address
  const addr = address & 0xFFFF;
  const headIdx = addr & 0x3;
  const bodyIdx = (addr >> 2) & 0x3;
  const feetIdx = (addr >> 4) & 0x3;

  // Name from data
  const nameIdx1 = (addr + command) % SYL1.length;
  const nameIdx2 = (command * 3 + addr) % SYL2.length;
  const name = SYL1[nameIdx1] + SYL2[nameIdx2];

  return {
    name, cls, protocol,
    address, command,
    stats,
    headIdx, bodyIdx, feetIdx,
    sprite: compositeSprite(headIdx, bodyIdx, feetIdx),
    isElite: false,
    upgrades: { hp: 0, atk: 0, def: 0, spd: 0 },
  };
}

function getEffectiveStats(phantom) {
  return {
    hp:  phantom.stats.hp + phantom.upgrades.hp * 3,
    atk: phantom.stats.atk + phantom.upgrades.atk * 2,
    def: phantom.stats.def + phantom.upgrades.def * 2,
    spd: phantom.stats.spd + phantom.upgrades.spd * 1,
  };
}

function generateEnemy(floor) {
  // Seeded PRNG from floor number
  let s = floor * 2654435761 >>> 0;
  const next = () => { s ^= s << 13; s ^= s >> 17; s ^= s << 5; return (s >>> 0); };

  const protoIdx = next() % PROTOCOLS.length;
  const proto = PROTOCOLS[protoIdx];
  const isRF = protoIdx >= PROTOCOLS_IR.length;
  const addr = next() & (isRF ? 0xFFFFFF : 0xFF);
  const cmd = next() & 0xFF;
  const enemy = generatePhantom(proto, addr, cmd, isRF);
  enemy.name = 'C-' + enemy.name;

  // Scale stats with floor
  const scale = 1 + floor * 0.12;
  enemy.stats.hp  = Math.floor(enemy.stats.hp * scale);
  enemy.stats.atk = Math.floor(enemy.stats.atk * scale);
  enemy.stats.def = Math.floor(enemy.stats.def * scale);
  enemy.stats.spd = Math.floor(enemy.stats.spd * scale);

  return enemy;
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() {
  const data = {
    activePhantom: game.activePhantom,
    stored: game.storedPhantoms,
    shards: game.dataShards,
    floor: game.currentFloor,
    ver: 3,
    hasSavedCombat: game.hasSavedCombat,
    savedCombatFloor: game.savedCombatFloor,
    savedEnemyPhantom: game.savedEnemyPhantom,
    savedEnemyHp: game.savedEnemyHp,
    savedEnemyHeat: game.savedEnemyHeat,
    savedEnemyOverloaded: game.savedEnemyOverloaded,
  };
  try { localStorage.setItem('eotp_save', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('eotp_save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    game.activePhantom = data.activePhantom;
    game.storedPhantoms = data.stored || [];
    game.dataShards = data.shards || 0;
    game.currentFloor = data.floor || 1;
    // v2: persistent combat
    game.hasSavedCombat      = data.hasSavedCombat || false;
    game.savedCombatFloor    = data.savedCombatFloor || 0;
    game.savedEnemyPhantom   = data.savedEnemyPhantom || null;
    game.savedEnemyHp        = data.savedEnemyHp || 0;
    game.savedEnemyHeat      = data.savedEnemyHeat || 0;
    game.savedEnemyOverloaded = data.savedEnemyOverloaded || false;
    // v3: migrate TECHNICIAN to GLITCH
    const ver = data.ver || 1;
    if (ver < 3) {
      if (game.activePhantom && game.activePhantom.cls === 'TECHNICIAN') game.activePhantom.cls = 'GLITCH';
      for (const p of game.storedPhantoms) if (p.cls === 'TECHNICIAN') p.cls = 'GLITCH';
      if (game.savedEnemyPhantom && game.savedEnemyPhantom.cls === 'TECHNICIAN') game.savedEnemyPhantom.cls = 'GLITCH';
    }
    // Rebuild sprites
    if (game.activePhantom)
      game.activePhantom.sprite = compositeSprite(game.activePhantom.headIdx, game.activePhantom.bodyIdx, game.activePhantom.feetIdx);
    for (const p of game.storedPhantoms)
      p.sprite = compositeSprite(p.headIdx, p.bodyIdx, p.feetIdx);
    if (game.savedEnemyPhantom)
      game.savedEnemyPhantom.sprite = compositeSprite(game.savedEnemyPhantom.headIdx, game.savedEnemyPhantom.bodyIdx, game.savedEnemyPhantom.feetIdx);
    return true;
  } catch(e) { return false; }
}

// ============================================================
// GAME STATE
// ============================================================
const game = {
  state: 'TITLE',
  prevState: null,
  activePhantom: null,
  storedPhantoms: [],
  dataShards: 0,
  currentFloor: 1,
  cursor: 0,
  maxCursor: 0,
  tick: 0,
  subState: null,
  scanMode: 'IR',
  // Combat state
  combat: null,
  // Scan state
  scanTimer: 0,
  pendingPhantom: null,
  // Message
  message: null,
  messageTimer: 0,
  // Collection scroll
  collectionIdx: 0,
  // Anim
  combatAnim: null,
  combatAnimTimer: 0,
  combatLog: [],
  // Exit flag
  exited: false,
  // Persistent combat — keep damaged enemy between phantom swaps
  hasSavedCombat: false,
  savedEnemyPhantom: null,
  savedEnemyHp: 0,
  savedEnemyHeat: 0,
  savedEnemyOverloaded: false,
  savedCombatFloor: 0,
};

function setState(newState) {
  game.prevState = game.state;
  game.state = newState;
  game.cursor = 0;
  game.subState = null;
}

function showMessage(msg, dur = 60) {
  game.message = msg;
  game.messageTimer = dur;
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
const keyJustPressed = {};

function handleInput(key) {
  initAudio();
  if (keyJustPressed[key]) return;
  keyJustPressed[key] = true;
  keys[key] = true;

  switch (game.state) {
    case 'TITLE':    inputTitle(key); break;
    case 'MENU':     inputMenu(key); break;
    case 'SCAN':     inputScan(key); break;
    case 'SUMMON':   inputSummon(key); break;
    case 'PHANTOM':  inputPhantom(key); break;
    case 'COMBAT':   inputCombat(key); break;
    case 'VICTORY':  inputVictory(key); break;
    case 'DEFEAT':   inputDefeat(key); break;
    case 'CAMP':     inputCamp(key); break;
    case 'INFO':     inputInfo(key); break;
    case 'COLLECTION': inputCollection(key); break;
    case 'UPGRADE':  inputUpgrade(key); break;
  }
}

function inputTitle(key) {
  if (key === 'ok') {
    sfxSelect();
    loadGame();
    setState('MENU');
  }
  if (key === 'back') {
    // Exit app — wipe save, show goodbye, stop loop
    sfxBack();
    game.activePhantom = null;
    game.storedPhantoms = [];
    game.dataShards = 0;
    game.currentFloor = 1;
    try { localStorage.removeItem('eotp_save'); } catch(e) {}
    game.exited = true;
  }
}

function inputMenu(key) {
  const items = ['SCAN', 'MY PHANTOM', 'ASCEND', 'DESCEND', 'CAMP'];
  game.maxCursor = items.length - 1;
  if (key === 'up') { game.cursor = Math.max(0, game.cursor - 1); sfxNavigate(); }
  if (key === 'down') { game.cursor = Math.min(game.maxCursor, game.cursor + 1); sfxNavigate(); }
  if (key === 'ok') {
    sfxSelect();
    switch (game.cursor) {
      case 0: setState('SCAN'); game.scanTimer = 0; game.subState = null; break;
      case 1:
        if (!game.activePhantom) { showMessage('NO PHANTOM YET!'); sfxBack(); }
        else setState('PHANTOM');
        break;
      case 2:
        if (game.currentFloor > 1) {
          game.currentFloor--;
          saveGame();
          showMessage('ASCENDED!');
        } else {
          showMessage('AT SURFACE!');
          sfxBack();
        }
        break;
      case 3:
        if (!game.activePhantom) { showMessage('SCAN FIRST!'); sfxBack(); }
        else { setState('COMBAT'); startCombat(); }
        break;
      case 4: setState('CAMP'); break;
    }
  }
}

function inputScan(key) {
  // Mode selection
  if (game.subState === null) {
    if (key === 'back') { sfxBack(); setState('MENU'); return; }
    if (key === 'up' || key === 'down') {
      game.scanMode = game.scanMode === 'IR' ? 'RF' : 'IR';
      sfxNavigate();
      return;
    }
    if (key === 'ok') {
      if (game.scanMode === 'RF') sfxScanRF(); else sfxScan();
      game.subState = 'SCANNING';
      game.scanTimer = 0;
    }
    return;
  }
}

function inputSummon(key) {
  if (game.subState === 'SHOW') {
    game.maxCursor = 1;
    if (key === 'left' || key === 'right') {
      game.cursor = game.cursor === 0 ? 1 : 0;
      sfxNavigate();
    }
    if (key === 'ok') {
      sfxSelect();
      if (game.cursor === 0) { // KEEP
        if (game.activePhantom) {
          if (game.storedPhantoms.length < 10) {
            game.storedPhantoms.push(game.activePhantom);
          } else {
            // Replace oldest
            game.storedPhantoms.shift();
            game.storedPhantoms.push(game.activePhantom);
          }
        }
        game.activePhantom = game.pendingPhantom;
        saveGame();
        showMessage('ACQUIRED!');
      }
      setState('MENU');
    }
    if (key === 'back') { sfxBack(); setState('MENU'); }
  }
}

function inputPhantom(key) {
  if (key === 'back') { sfxBack(); setState('MENU'); }
}

function inputCombat(key) {
  if (!game.combat || game.combat.state !== 'PLAYER_TURN') return;
  if (key === 'up') {
    if (game.cursor >= 2) { game.cursor -= 2; sfxNavigate(); }
  }
  if (key === 'down') {
    if (game.cursor <= 1) { game.cursor += 2; sfxNavigate(); }
  }
  if (key === 'left') {
    if (game.cursor === 1 || game.cursor === 3) { game.cursor -= 1; sfxNavigate(); }
  }
  if (key === 'right') {
    if (game.cursor === 0 || game.cursor === 2) { game.cursor += 1; sfxNavigate(); }
  }
  if (key === 'ok') {
    sfxSelect();
    executeTurn(game.cursor);
  }
  if (key === 'back') {
    sfxBack();
    const c = game.combat;
    // Save enemy state
    game.savedEnemyPhantom    = c.enemy.phantom;
    game.savedEnemyHp         = c.enemy.hp;
    game.savedEnemyHeat       = c.enemy.heat;
    game.savedEnemyOverloaded = c.enemy.overloaded;
    game.savedCombatFloor     = game.currentFloor;
    game.hasSavedCombat       = true;
    saveGame();
    // Go back to menu
    setState('MENU');
    game.combatLog = ['RETREATED!'];
  }
}

function inputVictory(key) {
  if (key === 'ok') { sfxSelect(); setState('MENU'); }
}

function inputDefeat(key) {
  if (key === 'ok') {
    sfxSelect();
    // Phantom already wiped in combat loss handler
    setState('MENU');
  }
}

function inputCamp(key) {
  const items = ['UPGRADE STATS','COLLECTION','COMBAT INFO','BACK'];
  game.maxCursor = items.length - 1;
  if (key === 'up')   { game.cursor = Math.max(0, game.cursor - 1); sfxNavigate(); }
  if (key === 'down') { game.cursor = Math.min(game.maxCursor, game.cursor + 1); sfxNavigate(); }
  if (key === 'ok') {
    sfxSelect();
    if (game.cursor === 0) {
      if (!game.activePhantom) { showMessage('NO PHANTOM!'); sfxBack(); }
      else setState('UPGRADE');
    }
    if (game.cursor === 1) { setState('COLLECTION'); game.collectionIdx = 0; }
    if (game.cursor === 2) { setState('INFO'); game.cursor = 0; }
    if (game.cursor === 3) setState('MENU');
  }
  if (key === 'back') { sfxBack(); setState('MENU'); }
}

function inputInfo(key) {
  if (key === 'left') {
    if (game.cursor > 0) { game.cursor--; sfxNavigate(); }
  }
  if (key === 'right') {
    if (game.cursor < 2) { game.cursor++; sfxNavigate(); }
  }
  if (key === 'back') {
    sfxBack();
    setState('CAMP');
    game.cursor = 2;
  }
}

function inputUpgrade(key) {
  const stats = ['HP','ATK','DEF','SPD'];
  game.maxCursor = stats.length;
  if (key === 'up')   { game.cursor = Math.max(0, game.cursor - 1); sfxNavigate(); }
  if (key === 'down') { game.cursor = Math.min(game.maxCursor, game.cursor + 1); sfxNavigate(); }
  if (key === 'ok') {
    if (game.cursor < 4) {
      const cost = (game.activePhantom.upgrades[stats[game.cursor].toLowerCase()] + 1) * 3;
      if (game.dataShards >= cost) {
        game.dataShards -= cost;
        game.activePhantom.upgrades[stats[game.cursor].toLowerCase()]++;
        sfxHeal();
        saveGame();
      } else {
        showMessage('NOT ENOUGH!');
        sfxBack();
      }
    } else {
      sfxBack();
      setState('CAMP');
    }
  }
  if (key === 'back') { sfxBack(); setState('CAMP'); }
}

function inputCollection(key) {
  const total = game.storedPhantoms.length + (game.activePhantom ? 1 : 0);
  if (key === 'up' || key === 'left') { game.collectionIdx = Math.max(0, game.collectionIdx - 1); sfxNavigate(); }
  if (key === 'down' || key === 'right') { game.collectionIdx = Math.min(total - 1, game.collectionIdx + 1); sfxNavigate(); }
  if (key === 'ok' && total > 0) {
    // Selecting active phantom is a no-op
    if (game.activePhantom && game.collectionIdx === 0) {
      sfxBack();
      setState('CAMP');
    } else {
      const si = game.collectionIdx - (game.activePhantom ? 1 : 0);
      const selected = game.storedPhantoms[si];
      if (game.activePhantom) {
        game.storedPhantoms[si] = game.activePhantom;
      } else {
        game.storedPhantoms.splice(si, 1);
      }
      game.activePhantom = selected;
      sfxSelect();
      showMessage('SET ACTIVE!');
      saveGame();
      setState('CAMP');
    }
  }
  if (key === 'back') { sfxBack(); setState('CAMP'); }
}

// ============================================================
// COMBAT ENGINE
// ============================================================
function getClassAdvantage(attackerClass, defenderClass) {
  if ((attackerClass === 'BRAWLER' && defenderClass === 'GLITCH') ||
      (attackerClass === 'GLITCH' && defenderClass === 'DEFENDER') ||
      (attackerClass === 'DEFENDER' && defenderClass === 'BRAWLER')) {
    return 1.3;
  }
  if ((attackerClass === 'GLITCH' && defenderClass === 'BRAWLER') ||
      (attackerClass === 'DEFENDER' && defenderClass === 'GLITCH') ||
      (attackerClass === 'BRAWLER' && defenderClass === 'DEFENDER')) {
    return 0.8;
  }
  return 1.0;
}

function startCombat() {
  /* Resume a saved (damaged) enemy on this floor */
  if (game.hasSavedCombat && game.savedCombatFloor === game.currentFloor) {
    const enemy = game.savedEnemyPhantom;
    const ps = getEffectiveStats(game.activePhantom);
    const es = getEffectiveStats(enemy);
    const foeFirst = es.spd > ps.spd;
    game.combat = {
      player: { phantom: game.activePhantom, hp: ps.hp, maxHp: ps.hp, heat: 0, overloaded: false, stats: ps },
      enemy:  { phantom: enemy, hp: game.savedEnemyHp, maxHp: es.hp, heat: game.savedEnemyHeat, overloaded: game.savedEnemyOverloaded, stats: es },
      state: foeFirst ? 'ENEMY_TURN' : 'PLAYER_TURN',
      floor: game.currentFloor,
      log: [foeFirst ? 'FOE IS FASTER REMATCH!' : 'FLOOR ' + game.currentFloor + ' - REMATCH!'],
    };
    game.hasSavedCombat = false;
    game.cursor = 0;
    if (foeFirst) setTimeout(() => enemyTurn(), 300);
    return;
  }

  const enemy = generateEnemy(game.currentFloor);
  const ps = getEffectiveStats(game.activePhantom);
  const es = getEffectiveStats(enemy);
  const foeFirst = es.spd > ps.spd;
  game.combat = {
    player: { phantom: game.activePhantom, hp: ps.hp, maxHp: ps.hp, heat: 0, overloaded: false, stats: ps },
    enemy:  { phantom: enemy, hp: es.hp, maxHp: es.hp, heat: 0, overloaded: false, stats: es },
    state: foeFirst ? 'ENEMY_TURN' : 'PLAYER_TURN',
    floor: game.currentFloor,
    log: [foeFirst ? 'FOE IS FASTER!' : 'FLOOR ' + game.currentFloor + ' - FIGHT!'],
  };
  game.cursor = 0;
  if (foeFirst) setTimeout(() => enemyTurn(), 300);
}

function calcDamage(attacker, defender, actionType) {
  let base;
  if (actionType === 1) {
    base = Math.floor(attacker.stats.atk * 1.5); // Surge
  } else if (actionType === 3) {
    base = Math.floor(attacker.stats.atk * 0.3); // Reverse
    if (base < 1) base = 1;
  } else {
    base = attacker.stats.atk; // Strike
  }

  // Flat DEF reduction (DEF/3)
  base = base - Math.floor(defender.stats.def / 3);
  if (base < 1) base = 1;

  // Class advantage multiplier
  const adv = getClassAdvantage(attacker.phantom.cls, defender.phantom.cls);
  base = Math.floor(base * adv);
  if (base < 1) base = 1;

  // Crit check: SPD * 2 / 100, capped at 25%
  const critChance = Math.min(0.25, attacker.stats.spd * 0.02);
  const isCrit = Math.random() < critChance;
  if (isCrit) base = Math.floor(base * 1.8);

  // Small random variance ±15%
  const variance = 0.85 + Math.random() * 0.30;
  const damage = Math.max(1, Math.floor(base * variance));
  return { damage, isCrit };
}

function executeTurn(actionIdx) {
  const c = game.combat;
  if (c.state !== 'PLAYER_TURN') return;

  c.player.defending = false;
  const spdReduce = Math.floor(c.player.stats.spd / 2);

  // Player action
  if (c.player.overloaded) {
    c.log.push('YOU ARE OVERLOADED!');
    c.player.overloaded = false;
    c.player.heat = Math.max(0, c.player.heat - 50);
  } else {
    switch(actionIdx) {
      case 0: { // Strike
        const res = calcDamage(c.player, c.enemy, 0);
        let dmg = res.damage;
        if (c.enemy.defending) { dmg = Math.floor(dmg * 0.5); c.enemy.defending = false; }
        c.enemy.hp -= dmg;
        let heat = 20 - spdReduce;
        if (heat < 0) heat = 0;
        c.player.heat += heat;
        c.log.push('STRIKE: ' + dmg + (res.isCrit ? ' CRIT!' : ''));
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 4; sfxHit(); }
        break;
      }
      case 1: { // Surge
        const res = calcDamage(c.player, c.enemy, 1);
        let dmg = res.damage;
        if (c.enemy.defending) { dmg = Math.floor(dmg * 0.5); c.enemy.defending = false; }
        c.enemy.hp -= dmg;
        let heat = 35 - spdReduce;
        if (heat < 0) heat = 0;
        c.player.heat += heat;
        c.log.push('SURGE: ' + dmg + (res.isCrit ? ' CRIT!' : ''));
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 6; sfxHit(); }
        break;
      }
      case 2: { // Guard
        c.player.heat = Math.max(0, c.player.heat - 30);
        c.player.defending = true;
        c.log.push('GUARD! -30 HEAT');
        sfxHeal();
        break;
      }
      case 3: { // Reverse
        const res = calcDamage(c.player, c.enemy, 3);
        let dmg = res.damage;
        if (c.enemy.defending) { dmg = Math.floor(dmg * 0.5); c.enemy.defending = false; }
        c.enemy.hp -= dmg;
        let heat = 10 - spdReduce;
        if (heat < 0) heat = 0;
        c.player.heat += heat;
        c.enemy.heat += 20;
        if (c.enemy.heat >= 100) {
          c.enemy.overloaded = true;
          c.enemy.heat = 100;
          const ov = Math.floor(c.enemy.maxHp * 0.08);
          c.enemy.hp -= ov;
          c.log.push('REV! FOE OVERLOADED -' + ov);
        } else {
          c.log.push('REV: ' + dmg + ' +20H FOE' + (res.isCrit ? ' CR' : ''));
        }
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 4; sfxHit(); }
        break;
      }
    }
  }

  // Check overload
  if (c.player.heat >= 100) {
    c.player.overloaded = true;
    c.player.heat = 100;
    const ovDmg = Math.floor(c.player.maxHp * 0.08);
    c.player.hp -= ovDmg;
    c.log.push('OVERLOAD! -' + ovDmg + ' HP');
    screenShake = 8;
  }

  // Check player death from overload
  if (c.player.hp <= 0) {
    c.player.hp = 0;
    c.state = 'LOSE';
    // Save enemy state for rematch
    game.savedEnemyPhantom   = c.enemy.phantom;
    game.savedEnemyHp        = c.enemy.hp;
    game.savedEnemyHeat      = c.enemy.heat;
    game.savedEnemyOverloaded = c.enemy.overloaded;
    game.savedCombatFloor    = game.currentFloor;
    game.hasSavedCombat      = true;
    game.activePhantom = null;
    saveGame();
    sfxDefeat();
    setTimeout(() => setState('DEFEAT'), 800);
    return;
  }

  // Check enemy defeat
  if (c.enemy.hp <= 0) {
    c.enemy.hp = 0;
    c.state = 'WIN';
    const shards = game.currentFloor + 1;
    game.dataShards += shards;
    game.currentFloor++;
    game.hasSavedCombat = false;
    saveGame();
    sfxVictory();
    setTimeout(() => setState('VICTORY'), 800);
    game.combat.shardReward = shards;
    return;
  }

  // Enemy turn
  setTimeout(() => enemyTurn(), 300);
  c.state = 'ENEMY_TURN';
}

function enemyTurn() {
  const c = game.combat;
  if (c.state !== 'ENEMY_TURN') return;

  c.enemy.defending = false;
  const spdReduce = Math.floor(c.enemy.stats.spd / 2);

  if (c.enemy.overloaded) {
    c.log.push('ENEMY OVERLOADED!');
    c.enemy.overloaded = false;
    c.enemy.heat = Math.max(0, c.enemy.heat - 50);
  } else {
    // AI: weighted random based on heat
    let action;
    const roll = Math.random();
    if (c.enemy.heat >= 80) {
      // 5% Strike, 70% Guard, 25% Reverse
      action = (roll < 0.05) ? 0 : (roll < 0.75) ? 2 : 3;
    } else if (c.enemy.heat >= 50) {
      // 20% Strike, 5% Surge, 50% Guard, 25% Reverse
      action = (roll < 0.20) ? 0 : (roll < 0.25) ? 1 : (roll < 0.75) ? 2 : 3;
    } else {
      // 50% Strike, 15% Surge, 10% Guard, 25% Reverse
      action = (roll < 0.50) ? 0 : (roll < 0.65) ? 1 : (roll < 0.75) ? 2 : 3;
    }

    switch(action) {
      case 0: { // Strike
        const res = calcDamage(c.enemy, c.player, 0);
        let dmg = res.damage;
        if (c.player.defending) { dmg = Math.floor(dmg * 0.5); c.player.defending = false; }
        c.player.hp -= dmg;
        let heat = 20 - spdReduce;
        if (heat < 0) heat = 0;
        c.enemy.heat += heat;
        c.log.push('FOE STR: ' + dmg + (res.isCrit ? ' CRIT!' : ''));
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 4; sfxHit(); }
        break;
      }
      case 1: { // Surge
        const res = calcDamage(c.enemy, c.player, 1);
        let dmg = res.damage;
        if (c.player.defending) { dmg = Math.floor(dmg * 0.5); c.player.defending = false; }
        c.player.hp -= dmg;
        let heat = 35 - spdReduce;
        if (heat < 0) heat = 0;
        c.enemy.heat += heat;
        c.log.push('FOE SRG: ' + dmg + (res.isCrit ? ' CRIT!' : ''));
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 6; sfxHit(); }
        break;
      }
      case 2: { // Guard
        c.enemy.heat = Math.max(0, c.enemy.heat - 30);
        c.enemy.defending = true;
        c.log.push('FOE GUARDS');
        break;
      }
      case 3: { // Reverse
        const res = calcDamage(c.enemy, c.player, 3);
        let dmg = res.damage;
        if (c.player.defending) { dmg = Math.floor(dmg * 0.5); c.player.defending = false; }
        c.player.hp -= dmg;
        let heat = 10 - spdReduce;
        if (heat < 0) heat = 0;
        c.enemy.heat += heat;
        c.player.heat += 20;
        if (c.player.heat >= 100) {
          c.player.overloaded = true;
          c.player.heat = 100;
          const ov = Math.floor(c.player.maxHp * 0.08);
          c.player.hp -= ov;
        }
        c.log.push('FOE REV: ' + dmg);
        if (res.isCrit) { screenFlash = 2; sfxCrit(); } else { screenShake = 4; sfxHit(); }
        break;
      }
    }
  }

  // Check enemy overload
  if (c.enemy.heat >= 100) {
    c.enemy.overloaded = true;
    c.enemy.heat = 100;
    const ovDmg = Math.floor(c.enemy.maxHp * 0.08);
    c.enemy.hp -= ovDmg;
    c.log.push('FOE OVERLOAD! -' + ovDmg);
  }

  // Check enemy defeat from overload
  if (c.enemy.hp <= 0) {
    c.enemy.hp = 0;
    c.state = 'WIN';
    const shards = game.currentFloor + 1;
    game.dataShards += shards;
    game.currentFloor++;
    game.hasSavedCombat = false;
    saveGame();
    sfxVictory();
    game.combat.shardReward = shards;
    setTimeout(() => setState('VICTORY'), 800);
    return;
  }

  // Check player defeat
  if (c.player.hp <= 0) {
    c.player.hp = 0;
    c.state = 'LOSE';
    // Save enemy state for rematch
    game.savedEnemyPhantom   = c.enemy.phantom;
    game.savedEnemyHp        = c.enemy.hp;
    game.savedEnemyHeat      = c.enemy.heat;
    game.savedEnemyOverloaded = c.enemy.overloaded;
    game.savedCombatFloor    = game.currentFloor;
    game.hasSavedCombat      = true;
    game.activePhantom = null;
    saveGame();
    sfxDefeat();
    setTimeout(() => setState('DEFEAT'), 800);
    return;
  }

  c.state = 'PLAYER_TURN';
  c.player.defending = false;
}

function renderTitle() {

  drawCircle(cx, cy, 10);
  drawCircle(cx, cy, 5, true);

  const py = cy + Math.floor(Math.cos(t * 0.07) * 2);
  drawCircle(px, py, 2, true);

  // Eyelid blink every ~3s
  if ((t % 90) < 5) {
    for (let dy = -12; dy <= 0; dy++)
      for (let dx = -12; dx <= 12; dx++)
        if (dx*dx+dy*dy <= 144) setPixel(cx+dx, cy+dy, false);
  }

  drawTextCentered('EYE OF THE', 36);
  drawTextCentered('PHANTOM', 44);

  if (Math.floor(t / 20) % 2 === 0)
    drawTextCentered('PRESS OK', 56);

  flushBuffer();
}

function renderScan() {
  clearBuffer();

  if (game.subState === null) {
    // Scan type selection
    drawTextCentered('SCAN TYPE', 2);
    drawLine(0, 9, 127, 9);

    // IR option
    if (game.scanMode === 'IR') {
      drawRect(0, 13, 128, 22, true);
      drawText('  INFRARED  ', 8, 16, true);
      drawText('TV/AC/LED', 8, 24, true);
    } else {
      drawText('  INFRARED  ', 8, 16);
      drawText('TV/AC/LED', 8, 24);
    }

    // RF option
    if (game.scanMode === 'RF') {
      drawRect(0, 37, 128, 22, true);
      drawText('  433MHZ RF  ', 8, 40, true);
      drawText('FOB/SENSOR', 8, 48, true);
    } else {
      drawText('  433MHZ RF  ', 8, 40);
      drawText('FOB/SENSOR', 8, 48);
    }

    drawTextCentered('UP/DN:SWITCH  OK:SCAN', 59);
  }
  else if (game.subState === 'SCANNING') {
    game.scanTimer++;

    if (game.scanMode === 'IR') {
      drawTextCentered('IR SCANNING...', 4);
      // Animated concentric circles
      const cx = 64, cy = 32;
      const phase = game.scanTimer;
      for (let r = 1; r < 4; r++) {
        const radius = ((phase + r * 16) % 56) + 2;
        if (radius < 25) drawCircle(cx, cy, radius);
      }
    } else {
      drawTextCentered('RF SCANNING...', 4);
      // Animated radio waves (sine waves)
      const t = game.scanTimer;
      for (let wave = 0; wave < 3; wave++) {
        const baseY = 22 + wave * 12;
        const amp = 3 + wave * 1.5;
        for (let x = 20; x < 108; x++) {
          const y = baseY + Math.floor(Math.sin((x + t) * 0.15 + wave) * amp);
          if ((x + t + wave * 8) % 4 === 0) setPixel(x, y);
        }
      }
      // Antenna icon
      drawLine(64, 6, 64, 14);
      drawLine(64, 14, 58, 20);
      drawLine(64, 14, 70, 20);
    }

    // Signal detected after delay
    if (game.scanTimer > 40) {
      let proto, addr, cmd;
      if (game.scanMode === 'IR') {
        proto = PROTOCOLS_IR[Math.floor(Math.random() * 4)];
        addr = Math.floor(Math.random() * 256);
        cmd = Math.floor(Math.random() * 256);
      } else {
        proto = PROTOCOLS_RF[Math.floor(Math.random() * 4)];
        // 433MHz signals: 24-bit address + 8-bit command typical
        addr = Math.floor(Math.random() * 0xFFFFFF);
        cmd = Math.floor(Math.random() * 256);
      }

      game.pendingPhantom = generatePhantom(proto, addr, cmd, game.scanMode === 'RF');
      game.subState = null;
      setState('SUMMON');
      game.subState = 'REVEAL';
      game.scanTimer = 0;
    }
  }

  flushBuffer();
}

function renderSummon() {

  if (game.subState === 'REVEAL') {

      // Draw noise that gradually clears
      for (let y = 0; y < 64; y++) {

  drawText('H', 1, 8);

  drawHBar(76, 8, 50, 4, c.enemy.heat / 100);

  drawLine(0, 13, 127, 13);

  // === MIDDLE: Sprites (rows 14-45) ===
  const playerSpriteY = 18;

  const pShakeX = (c.state === 'ENEMY_TURN' || c.player.overloaded) ? Math.floor(Math.random()*2) : 0;
  drawSprite(c.player.phantom.sprite, 8 + pShakeX, playerSpriteY, c.player.overloaded && game.tick % 6 < 3);

  drawSprite(c.enemy.phantom.sprite, 104 + eShakeX, enemySpriteY, c.enemy.overloaded && game.tick % 6 < 3);

function renderMessageOverlay() {
  if (!game.message) return;
  const msg = game.message;
  const w = msg.length * CHAR_W + 8;
  const x = Math.floor((SCREEN_W - w) / 2);
  const y = 24;

  // Draw border
  drawRect(x - 2, y, w + 4, 14);
  // Fill box with ON (foreground) pixels
  drawRect(x - 1, y + 1, w + 2, 12, true);
  // Draw text INVERTED so it appears as BG-color text on the filled box
  drawText(msg, x + 4, y + 4, true);
}

// ============================================================
// MAIN LOOP
// ============================================================
function render() {
  if (game.exited) {
    // Draw final goodbye frame once, then stop
    clearBuffer();
    drawTextCentered('GOODBYE', 28);
    flushBuffer();
    return;
  }

  switch (game.state) {
    case 'TITLE':      renderTitle(); break;
    case 'MENU':       renderMenu(); break;
    case 'SCAN':       renderScan(); break;
    case 'SUMMON':     renderSummon(); break;
    case 'PHANTOM':    renderPhantom(); break;
    case 'COMBAT':     renderCombat(); break;
    case 'VICTORY':    renderVictory(); break;
    case 'DEFEAT':     renderDefeat(); break;
    case 'CAMP':       renderCamp(); break;
    case 'INFO':       renderInfo(); break;
    case 'UPGRADE':    renderUpgrade(); break;
    case 'COLLECTION': renderCollection(); break;
  }

  // Tick message timer
  if (game.messageTimer > 0) {
    game.messageTimer--;
    if (game.messageTimer <= 0) game.message = null;
  }
}

function gameLoop() {
  if (game.exited) {
    render();  // draw goodbye once more
    return;    // then stop forever
  }
  game.tick++;
  render();
  requestAnimationFrame(gameLoop);
}

const KEY_MAP = {
  'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
  'Enter': 'ok', 'Escape': 'back', ' ': 'ok',
  'w': 'up', 's': 'down', 'a': 'left', 'd': 'right',
};

document.addEventListener('keydown', (e) => {
  const key = KEY_MAP[e.key];
  if (key) {
    e.preventDefault();
    handleInput(key);
  }
});

document.addEventListener('keyup', (e) => {
  const key = KEY_MAP[e.key];
  if (key) {
    keys[key] = false;
    keyJustPressed[key] = false;
  }
});

// On-screen button bindings
document.querySelectorAll('.dpad-btn, .action-btn').forEach(btn => {
  const key = btn.dataset.key;
  if (!key) return;

  const press = (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    handleInput(key);
  };
  const release = (e) => {
    e.preventDefault();
    btn.classList.remove('pressed');
    keys[key] = false;
    keyJustPressed[key] = false;
  };

  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
});

// ============================================================
// START
// ============================================================
gameLoop();
</script>
</body>
</html>
